<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notesify - Connection Lost</title>
  <!-- Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0c0c0e;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    .glow-blob {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      filter: blur(40px);
      z-index: 1;
      pointer-events: none;
    }

    .blob-left {
      top: -100px;
      left: -100px;
    }

    .blob-right {
      bottom: -100px;
      right: -100px;
    }

    /* Glassmorphic Container */
    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 440px;
      padding: 40px 32px;
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Animated Offline Icon */
    .icon-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid var(--accent-color);
      animation: pulse 2.5s infinite;
      opacity: 0;
    }

    .signal-icon {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--accent-color);
      stroke-width: 2.25;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px var(--accent-glow));
      animation: float 3s ease-in-out infinite;
    }

    /* Typography Styles */
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* Premium Button styling */
    .btn {
      width: 100%;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(99, 102, 241, 0.2);
    }

    .btn:disabled {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* Loading Spinner Styles */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.8s linear infinite;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }
      50% {
        opacity: 0.3;
      }
      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Ambient background glow blobs -->
  <div class="glow-blob blob-left"></div>
  <div class="glow-blob blob-right"></div>

  <div class="container">
    <div class="icon-wrapper">
      <div class="pulse-ring"></div>
      <svg class="signal-icon" viewBox="0 0 24 24">
        <!-- SVG Wi-Fi Off Icon -->
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.5 16a4.91 4.91 0 0 1 2.24-1.33M16.25 5c-3.15-.9-6.52-.86-9.64.12M12 20h.01" />
      </svg>
    </div>

    <h1>Unable to connect</h1>
    <p>We couldn't connect to Notesify. Please check your internet connection and try again.</p>

    <button type="button" id="retry-connection-btn" class="btn" onclick="retryConnection()">
      <span class="spinner" id="btn-spinner"></span>
      <span id="btn-text">Try Reconnecting</span>
    </button>
  </div>

  <script>
    const retryBtn = document.getElementById('retry-connection-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('btn-spinner');

    function retryConnection() {
      // Show loading spinner
      retryBtn.disabled = true;
      spinner.style.display = 'inline-block';
      btnText.textContent = 'Reconnecting...';

      // Small delay to feel tactile and then redirect to production domain
      setTimeout(() => {
        window.location.href = 'https://app.notesify.in';
      }, 800);
    }

    // Proactive auto-reconnect: if the computer regains internet access, reload automatically!
    window.addEventListener('online', () => {
      retryConnection();
    });
  </script>
</body>
</html>
